version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: home_postgres
    environment:
      POSTGRES_DB: 
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
    volumes:
      - pgdata:/var/lib/postgresql/data
     expose:
      - "5432"
    networks:
      - home-monitoring
    restart: always

volumes:
  pgdata:

networks:
  home-monitoring:
    external: true
