version: "3.9"

services:
  java-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: home_java
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://home_postgres:5432/home_monitoring
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    ports:
      - "9000:9000"
    networks:
      - home-monitoring
    restart: always

networks:
  home-monitoring:
    external: true
