version: "3.9"

services:
  postgres:
    image: postgres:latest
    container_name: home_postgres
    environment:
      POSTGRES_DB: home_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - home-monitoring
    restart: always

volumes:
  pgdata:

networks:
  home-monitoring:
    external: true
